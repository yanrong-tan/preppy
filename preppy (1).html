    // ── Pure canvas chart components (no dependencies) ──────────────────────
    function LineChartCanvas({ data, dataKey, color, target, unit, height=260 }) {
      const ref = React.useRef();
      React.useEffect(() => {
        if (!data || data.length === 0) return;
        const canvas = ref.current;
        const dpr = window.devicePixelRatio || 1;
        const W = canvas.offsetWidth, H = height;
        canvas.width = W * dpr; canvas.height = H * dpr;
        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);
        const pl=48, pr=16, pt=16, pb=40;
        const vals = data.map(d => d[dataKey] || 0);
        const maxV = Math.max(...vals, target || 0, 1);
        const minV = 0;
        const xStep = (W - pl - pr) / Math.max(data.length - 1, 1);
        const yScale = v => pt + (H - pt - pb) * (1 - (v - minV) / (maxV - minV));
        const xPos = i => pl + i * xStep;
        // Grid
        ctx.strokeStyle = '#e8d5be'; ctx.lineWidth = 1;
        [0, 0.25, 0.5, 0.75, 1].forEach(f => {
          const y = pt + (H - pt - pb) * f;
          ctx.beginPath(); ctx.moveTo(pl, y); ctx.lineTo(W - pr, y); ctx.stroke();
          ctx.fillStyle = '#8c6f5a'; ctx.font = '10px Lato,sans-serif'; ctx.textAlign = 'right';
          ctx.fillText(Math.round(maxV * (1 - f)), pl - 4, y + 3);
        });
        // X labels
        ctx.fillStyle = '#8c6f5a'; ctx.font = '10px Lato,sans-serif'; ctx.textAlign = 'center';
        data.forEach((d, i) => {
          if (data.length <= 8 || i % Math.ceil(data.length / 6) === 0)
            ctx.fillText(d.label, xPos(i), H - pb + 14);
        });
        // Target line
        if (target > 0) {
          ctx.strokeStyle = '#c4a882'; ctx.lineWidth = 1.5;
          ctx.setLineDash([5, 5]);
          const ty = yScale(target);
          ctx.beginPath(); ctx.moveTo(pl, ty); ctx.lineTo(W - pr, ty); ctx.stroke();
          ctx.setLineDash([]);
          ctx.fillStyle = '#8c6f5a'; ctx.font = '9px Lato,sans-serif'; ctx.textAlign = 'right';
          ctx.fillText('Target', W - pr - 2, ty - 3);
        }
        // Line
        ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.setLineDash([]);
        ctx.beginPath();
        vals.forEach((v, i) => {
          if (i === 0) ctx.moveTo(xPos(i), yScale(v));
          else ctx.lineTo(xPos(i), yScale(v));
        });
        ctx.stroke();
        // Dots
        vals.forEach((v, i) => {
          ctx.beginPath();
          ctx.arc(xPos(i), yScale(v), data[i].isCurrent ? 6 : 4, 0, Math.PI * 2);
          ctx.fillStyle = color; ctx.fill();
          ctx.strokeStyle = 'white'; ctx.lineWidth = 2; ctx.stroke();
        });
      }, [data, dataKey, color, target, height]);
      return React.createElement('canvas', { ref, style: { width: '100%', height, display: 'block' } });
    }

    function BarChartCanvas({ data, height=240 }) {
      const ref = React.useRef();
      React.useEffect(() => {
        if (!data || data.length === 0) return;
        const canvas = ref.current;
        const dpr = window.devicePixelRatio || 1;
        const W = canvas.offsetWidth, H = height;
        canvas.width = W * dpr; canvas.height = H * dpr;
        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);
        const pl=40, pr=16, pt=16, pb=40;
        const vals = data.map(d => d.meals || 0);
        const maxV = Math.max(...vals, 1);
        const barW = Math.max(8, ((W - pl - pr) / data.length) * 0.6);
        const xStep = (W - pl - pr) / Math.max(data.length, 1);
        const yScale = v => pt + (H - pt - pb) * (1 - v / maxV);
        // Grid
        ctx.strokeStyle = '#e8d5be'; ctx.lineWidth = 1;
        [0, 0.25, 0.5, 0.75, 1].forEach(f => {
          const y = pt + (H - pt - pb) * f;
          ctx.beginPath(); ctx.moveTo(pl, y); ctx.lineTo(W - pr, y); ctx.stroke();
          ctx.fillStyle = '#8c6f5a'; ctx.font = '10px Lato,sans-serif'; ctx.textAlign = 'right';
          ctx.fillText((maxV * (1 - f)).toFixed(1), pl - 4, y + 3);
        });
        // Bars
        data.forEach((d, i) => {
          const x = pl + i * xStep + xStep / 2 - barW / 2;
          const y = yScale(d.meals || 0);
          const barH = H - pb - y;
          ctx.fillStyle = d.isCurrent ? '#c4622d' : '#f5c5a3';
          ctx.beginPath();
          ctx.roundRect ? ctx.roundRect(x, y, barW, barH, 4) : ctx.rect(x, y, barW, barH);
          ctx.fill();
          // X label
          ctx.fillStyle = '#8c6f5a'; ctx.font = '10px Lato,sans-serif'; ctx.textAlign = 'center';
          if (data.length <= 8 || i % Math.ceil(data.length / 6) === 0)
            ctx.fillText(d.label, x + barW / 2, H - pb + 14);
        });
      }, [data, height]);
      return React.createElement('canvas', { ref, style: { width: '100%', height, display: 'block' } });
    }

const UNIT_TO_G = {g:1,kg:1000,ml:1,l:1000,tbsp:15,tsp:5,cup:240,oz:28.35,lb:453.6,slice:30,whole:100,piece:100,clove:5,"":100};

function estimateNutrition(ingredients) {
  let cal=0,pro=0,fat=0,fib=0;
  ingredients.forEach(ing => {
    if (!ing.item.trim()) return;
    const name=ing.item.toLowerCase(), qty=parseFloat(ing.qty)||0;
    const unitG=UNIT_TO_G[ing.unit?.toLowerCase()]||100, grams=qty*unitG;
    const match=Object.entries(NUTRITION_DB).find(([k])=>name.includes(k));
    if (match) { const [,v]=match,f=grams/v.per; cal+=v.cal*f;pro+=v.pro*f;fat+=v.fat*f;fib+=v.fib*f; }
  });
  return {calories:Math.round(cal),protein:Math.round(pro),fats:Math.round(fat),fibre:Math.round(fib)};
}

// ── Craving keyword map ─────────────────────────────────────────────────────
// Each entry: { macro, direction, thresholdPct }
// thresholdPct: recipe macro as % of user's daily target to qualify
const CRAVING_KEYWORDS = [
  {words:["high protein","high-protein","protein","lean","muscle"],macro:"protein",dir:"high",pct:0.30},
  {words:["low protein"],macro:"protein",dir:"low",pct:0.15},
  {words:["low calorie","low-calorie","light","diet","low cal"],macro:"calories",dir:"low",pct:0.25},
  {words:["high calorie","high-calorie","filling","hearty","bulk"],macro:"calories",dir:"high",pct:0.40},
  {words:["low fat","low-fat"],macro:"fats",dir:"low",pct:0.15},
  {words:["high fat","high-fat","keto","fatty"],macro:"fats",dir:"high",pct:0.35},
  {words:["high fibre","high-fibre","high fiber","high-fiber","fibre","fiber","gut health"],macro:"fibre",dir:"high",pct:0.30},
  {words:["low fibre","low-fiber"],macro:"fibre",dir:"low",pct:0.10},
];

function smartCravingSearch(query, recipes, targetsNum) {
  const q = query.toLowerCase().trim();
  if (!q) return null;

  // Check if query matches any nutrition keyword
  let macroRule = null;
  for (const rule of CRAVING_KEYWORDS) {
    if (rule.words.some(w => q.includes(w))) { macroRule = rule; break; }
  }

  let results;
  if (macroRule) {
    const { macro, dir, pct } = macroRule;
    const macroKey = macro === "calories" ? "calories" : macro === "protein" ? "protein" : macro === "fats" ? "fats" : "fibre";
    const targetVal = targetsNum[macroKey] || 1;
    const threshold = targetVal * pct;

    if (dir === "high") {
      results = recipes
        .filter(r => r[macroKey] >= threshold)
        .sort((a, b) => b[macroKey] - a[macroKey]);
    } else {
      results = recipes
        .filter(r => r[macroKey] <= threshold)
        .sort((a, b) => a[macroKey] - b[macroKey]);
    }
    return { results, macroRule, matchType: "nutrition" };
  }

  // Fall back to text match on name / cuisine / difficulty / tags
  results = recipes.filter(r =>
    r.name.toLowerCase().includes(q) ||
    r.cuisine.toLowerCase().includes(q) ||
    r.difficulty.toLowerCase().includes(q) ||
    (r.tags||[]).some(t => t.includes(q))
  );
  return { results, macroRule: null, matchType: "text" };
}

function toDateStr(d) {
  return d.toISOString().slice(0,10); // YYYY-MM-DD
}
function addDays(d, n) {
  const r = new Date(d); r.setDate(r.getDate()+n); return r;
}
function startOfWeek(d) {
  // Monday-based
  const r = new Date(d);
  const day = r.getDay(); // 0=Sun
  const diff = day===0 ? -6 : 1-day;
  r.setDate(r.getDate()+diff);
  r.setHours(0,0,0,0);
  return r;
}

// ── localStorage persistence (per-user namespaced) ──────────────────────────
const LS_ACTIVE_USER = "preppy_active_user";
const LS_ALL_USERS   = "preppy_users"; // list of usernames

function lsRaw(key, fallback) {
  try { const v=localStorage.getItem(key); return v!==null?JSON.parse(v):fallback; } catch { return fallback; }
}
function lsRawSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}
// User-scoped keys
function userKey(username, suffix) { return `preppy__${username}__${suffix}`; }
function lsGet(username, suffix, fallback) {
  return lsRaw(userKey(username, suffix), fallback);
}
function lsSet(username, suffix, val) {
  lsRawSet(userKey(username, suffix), val);
}
function getUsers() { return lsRaw(LS_ALL_USERS, []); }
function addUser(name) {
  const users = getUsers();
  if (!users.includes(name)) lsRawSet(LS_ALL_USERS, [...users, name]);
}
function deleteUserData(name) {
  ["recipes","planner","targets","checked","pin"].forEach(s => {
    try { localStorage.removeItem(userKey(name, s)); } catch {}
  });
  const users = getUsers().filter(u => u !== name);
  lsRawSet(LS_ALL_USERS, users);
}
function getUserPin(name) { return lsRaw(userKey(name,"pin"), null); }
function setUserPin(name, pin) { lsRawSet(userKey(name,"pin"), pin||null); }
function hasPin(name) { const p=getUserPin(name); return p!==null && p!==""; }

                    onKeyDown={e=>e.key==="Enter"&&nameInput.trim()&&(pinSetInput===""||pinSetInput.length===4)&&handleNew()}

            <div style={{marginBottom:6}}>

              <input type="password" inputMode="numeric" maxLength={4} placeholder="Leave blank for no PIN"
                value={pinSetInput} onChange={e=>setPinSetInput(e.target.value.replace(/[^0-9]/g,"").slice(0,4))}
                onKeyDown={e=>e.key==="Enter"&&nameInput.trim()&&(pinSetInput===""||pinSetInput.length===4)&&handleNew()}
                style={S.input}/>
              {pinSetInput.length>0&&pinSetInput.length<4&&(
                <p style={{fontSize:".75rem",color:"#c4622d",marginTop:-8,marginBottom:8}}>PIN must be exactly 4 digits</p>

            </div>
            <div style={{display:"flex",gap:8}}>

              <button onClick={handleNew} disabled={!nameInput.trim()||(pinSetInput.length>0&&pinSetInput.length<4)} style={{...S.btnPri(!!nameInput.trim()&&(pinSetInput===""||pinSetInput.length===4)),flex:2,width:"auto"}}>
                Create profile →
              </button>
            </div>
          </>
        )}

        {/* ── PIN entry mode ── */}
        {mode==="pin"&&(
          <>
            <div style={{textAlign:"center",marginBottom:24}}>
              <div style={{fontSize:"1.6rem",marginBottom:8}}>🔒</div>
              <p style={{fontFamily:"'Playfair Display',serif",fontSize:"1.1rem",color:"#3d2c1e",marginBottom:4}}>Welcome back, {pinTarget}!</p>
              <p style={{fontSize:".85rem",color:"#8c6f5a"}}>Enter your PIN to continue</p>
            </div>
            <div style={{display:"flex",justifyContent:"center",gap:12,marginBottom:20}}>
              {pinDots(pinEntry)}
            </div>
            {/* Number pad */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
              {[1,2,3,4,5,6,7,8,9].map(n=>(
                <button key={n} onClick={()=>{if(pinEntry.length<4){const np=pinEntry+n;setPinEntry(np);setPinError(false);if(np.length===4)setTimeout(()=>{if(np===getUserPin(pinTarget)){enter(pinTarget);}else{setPinError(true);setPinEntry("");}},120);}}}
                  style={{padding:"16px",background:"#f5e6d0",border:"1.5px solid #e8d5be",borderRadius:12,fontFamily:"'Lato',sans-serif",fontSize:"1.2rem",fontWeight:700,color:"#3d2c1e",cursor:"pointer",transition:"all .1s"}}
                  onMouseOver={e=>{e.currentTarget.style.background="#f7dece";e.currentTarget.style.borderColor="#c4622d";}}
                  onMouseOut={e=>{e.currentTarget.style.background="#f5e6d0";e.currentTarget.style.borderColor="#e8d5be";}}>
                  {n}
                </button>
              ))}
              <div/>{/* empty cell */}
              <button onClick={()=>{if(pinEntry.length<4){const np=pinEntry+"0";setPinEntry(np);setPinError(false);if(np.length===4)setTimeout(()=>{if(np===getUserPin(pinTarget)){enter(pinTarget);}else{setPinError(true);setPinEntry("");}},120);}}}
                style={{padding:"16px",background:"#f5e6d0",border:"1.5px solid #e8d5be",borderRadius:12,fontFamily:"'Lato',sans-serif",fontSize:"1.2rem",fontWeight:700,color:"#3d2c1e",cursor:"pointer",transition:"all .1s"}}
                onMouseOver={e=>{e.currentTarget.style.background="#f7dece";e.currentTarget.style.borderColor="#c4622d";}}

                style={{padding:"16px",background:"none",border:"1.5px solid #e8d5be",borderRadius:12,fontFamily:"'Lato',sans-serif",fontSize:"1.1rem",color:"#8c6f5a",cursor:"pointer"}}>⌫</button>

        {/* Delete profile confirm */}

          <div style={{position:"fixed",inset:0,background:"rgba(61,44,30,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:24}}>
            <div style={{background:"#fffaf4",borderRadius:16,padding:32,maxWidth:380,width:"100%",textAlign:"center",border:"1.5px solid #e8d5be",boxShadow:"0 4px 24px rgba(100,60,20,.13)"}}>
              <div style={{fontSize:"2rem",marginBottom:10}}>🗑️</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.1rem",marginBottom:8}}>Remove this profile?</div>
              <p style={{fontSize:".88rem",color:"#8c6f5a",marginBottom:6}}><strong style={{color:"#3d2c1e"}}>{deleteTarget}</strong></p>
              <p style={{fontSize:".82rem",color:"#991b1b",background:"#fee2e2",borderRadius:8,padding:"8px 12px",marginBottom:20}}>⚠️ All their recipes, planner data and goals will be permanently deleted.</p>
              <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                <button onClick={()=>setDeleteTarget(null)} style={{padding:"9px 20px",background:"transparent",border:"1.5px solid #e8d5be",borderRadius:10,fontFamily:"'Lato',sans-serif",fontSize:".85rem",fontWeight:700,color:"#8c6f5a",cursor:"pointer"}}>Cancel</button>
                <button onClick={executeDeleteUser} style={{padding:"9px 20px",background:"#dc2626",border:"none",borderRadius:10,fontFamily:"'Lato',sans-serif",fontSize:".85rem",fontWeight:700,color:"white",cursor:"pointer"}}>Yes, remove it</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── RecipeForm component ────────────────────────────────────────────────────
function RecipeForm({initial, onSave, onCancel, title}) {
  const [form, setForm] = useState({...initial, tagInput:initial.tagInput||""});
  const [estimating, setEstimating] = useState(false);
  const [estimated, setEstimated] = useState(false);
  const upd = (f,v) => setForm(x=>({...x,[f]:v}));

  const addTag = () => {
    const t=form.tagInput.trim().toLowerCase().replace(/\s+/g,"-");
    if (t&&!form.tags.includes(t)) setForm(x=>({...x,tags:[...x.tags,t],tagInput:""}));
    else setForm(x=>({...x,tagInput:""}));
  };
  const handleEstimate = () => {
    setEstimating(true);
    setTimeout(()=>{
      const e=estimateNutrition(form.ingredients);
      setForm(x=>({...x,calories:String(e.calories),protein:String(e.protein),fats:String(e.fats),fibre:String(e.fibre)}));
      setEstimating(false); setEstimated(true);
    },700);
  };
  const handleSave = () => {
    if (!form.name.trim()) return;
    onSave({...form,calories:Number(form.calories)||0,protein:Number(form.protein)||0,fats:Number(form.fats)||0,fibre:Number(form.fibre)||0,ingredients:form.ingredients.filter(i=>i.item.trim()),steps:form.steps.filter(s=>s.trim())});
  };

  return (
    <div className="modal" style={{maxWidth:620}} onClick={e=>e.stopPropagation()}>
      <button className="modal-close" onClick={onCancel}>✕</button>
      <h2>{title}</h2>
      <div className="form-row">
        <label className="form-label">Recipe Name</label>
        <input type="text" placeholder="e.g. Spicy Tuna Bowl" value={form.name} onChange={e=>upd("name",e.target.value)} />
      </div>
      <div className="form-grid form-row">
        <div><label className="form-label">Cuisine</label>
          <select value={form.cuisine} onChange={e=>upd("cuisine",e.target.value)}>{CUISINES.map(c=><option key={c}>{c}</option>)}</select></div>
        <div><label className="form-label">Difficulty</label>
          <select value={form.difficulty} onChange={e=>upd("difficulty",e.target.value)}>{DIFFICULTIES.map(d=><option key={d}>{d}</option>)}</select></div>
      </div>
      <div className="form-row">
        <label className="form-label">Custom Tags <span style={{fontWeight:300,textTransform:"none",letterSpacing:0}}>(optional — press Enter or click Add)</span></label>
        <div style={{display:"flex",gap:8}}>
          <input type="text" placeholder="e.g. high-protein, meal-prep, vegan..." value={form.tagInput}
            onChange={e=>upd("tagInput",e.target.value)} onKeyDown={e=>e.key==="Enter"&&(e.preventDefault(),addTag())} />
          <button className="btn btn-ghost btn-sm" onClick={addTag} style={{whiteSpace:"nowrap"}}>Add</button>
        </div>
        {form.tags.length>0&&<div className="tag-pills">{form.tags.map(t=><span key={t} className="tag-pill">{t}<button onClick={()=>setForm(x=>({...x,tags:x.tags.filter(y=>y!==t)}))}>✕</button></span>)}</div>}
      </div>
      <div className="form-row">
        <label className="form-label">Ingredients</label>
        {form.ingredients.map((ing,i)=>(
          <div key={i} className="ingredient-row">
            <input type="text" placeholder="Ingredient" value={ing.item} onChange={e=>setForm(x=>{const a=[...x.ingredients];a[i]={...a[i],item:e.target.value};return{...x,ingredients:a};})} />
            <input type="number" placeholder="Qty" value={ing.qty} onChange={e=>setForm(x=>{const a=[...x.ingredients];a[i]={...a[i],qty:e.target.value};return{...x,ingredients:a};})} />
            <input type="text" placeholder="Unit" value={ing.unit} onChange={e=>setForm(x=>{const a=[...x.ingredients];a[i]={...a[i],unit:e.target.value};return{...x,ingredients:a};})} />
            <button className="ingredient-remove" onClick={()=>setForm(x=>({...x,ingredients:x.ingredients.filter((_,j)=>j!==i)}))}>✕</button>
          </div>
        ))}
        <button className="btn btn-ghost btn-sm" onClick={()=>setForm(x=>({...x,ingredients:[...x.ingredients,{item:"",qty:"",unit:"g"}]}))}>+ Add ingredient</button>
      </div>
      <div className="form-row">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <label className="form-label" style={{marginBottom:0}}>Nutrition <span style={{fontWeight:300,textTransform:"none",letterSpacing:0}}>(editable)</span></label>
          <button className="btn btn-ghost btn-sm" onClick={handleEstimate} disabled={estimating} style={{fontSize:"0.75rem"}}>{estimating?"⏳ Estimating...":"✨ Auto-estimate from ingredients"}</button>
        </div>
        {estimated&&<div className="nutri-estimate-banner">✅ Estimated from your ingredients — feel free to adjust below.</div>}
        <div className="form-grid">
          {[["calories","Calories (kcal)"],["protein","Protein (g)"],["fats","Fats (g)"],["fibre","Fibre (g)"]].map(([key,label])=>(
            <div key={key}><label className="form-label" style={{fontSize:"0.7rem"}}>{label}</label>
              <input type="number" placeholder="0" value={form[key]} onChange={e=>upd(key,e.target.value)} onFocus={e=>{if(e.target.value==="0")upd(key,"");}} /></div>
          ))}
        </div>
      </div>
      <div className="form-row">
        <label className="form-label">Steps</label>
        {form.steps.map((step,i)=>(
          <div key={i} style={{display:"flex",gap:8,marginBottom:8}}>
            <span className="step-num" style={{marginTop:10}}>{i+1}</span>
            <textarea rows={2} style={{resize:"vertical"}} placeholder={`Step ${i+1}...`} value={step}
              onChange={e=>setForm(x=>{const a=[...x.steps];a[i]=e.target.value;return{...x,steps:a};})} />
          </div>
        ))}
        <button className="btn btn-ghost btn-sm" onClick={()=>setForm(x=>({...x,steps:[...x.steps,""]}))}>+ Add step</button>
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}>
        <button className="btn btn-ghost" onClick={onCancel}>Cancel</button>
        <button className="btn btn-primary" onClick={handleSave}>Save Recipe</button>
      </div>
    </div>
  );
}

// ── Main App ────────────────────────────────────────────────────────────────
function MealPrepPlanner({ username, onSwitchUser }) {
  const today = useMemo(()=>{ const d=new Date(); d.setHours(0,0,0,0); return d; },[]);
  const todayStr = toDateStr(today);
  const todayDayName = DAYS[today.getDay()===0?6:today.getDay()-1]; // Mon=0 index

  const [tab, setTab] = useState("planner");
  const SAMPLE_RECIPES = [
    {id:1,name:"Avocado Toast",cuisine:"American",difficulty:"Easy",favourite:true,tags:["breakfast","quick"],calories:320,protein:8,fats:18,fibre:7,ingredients:[{item:"Sourdough bread",qty:2,unit:"slices"},{item:"Avocado",qty:1,unit:"whole"},{item:"Lemon juice",qty:1,unit:"tbsp"},{item:"Chili flakes",qty:0.5,unit:"tsp"}],steps:["Toast the sourdough until golden.","Mash avocado with lemon juice, salt & pepper.","Spread onto toast and top with chili flakes."]},
    {id:2,name:"Miso Salmon Bowl",cuisine:"Japanese",difficulty:"Medium",favourite:true,tags:["high-protein","bowl"],calories:520,protein:38,fats:14,fibre:4,ingredients:[{item:"Salmon fillet",qty:150,unit:"g"},{item:"White miso paste",qty:2,unit:"tbsp"},{item:"Brown rice",qty:80,unit:"g"},{item:"Edamame",qty:50,unit:"g"},{item:"Sesame oil",qty:1,unit:"tsp"}],steps:["Mix miso paste with sesame oil and coat salmon.","Bake at 200°C for 15 mins.","Cook rice and assemble bowl with edamame."]},
    {id:3,name:"Chickpea Curry",cuisine:"Indian",difficulty:"Medium",favourite:false,tags:["vegan","high-fibre"],calories:420,protein:16,fats:12,fibre:11,ingredients:[{item:"Chickpeas",qty:400,unit:"g"},{item:"Coconut milk",qty:200,unit:"ml"},{item:"Tomatoes",qty:2,unit:"whole"},{item:"Curry powder",qty:2,unit:"tbsp"},{item:"Onion",qty:1,unit:"whole"}],steps:["Sauté onion until soft.","Add curry powder and cook 1 min.","Add chickpeas, tomatoes, coconut milk. Simmer 20 mins."]},
    {id:4,name:"Greek Salad",cuisine:"Mediterranean",difficulty:"Easy",favourite:false,tags:["salad","no-cook"],calories:280,protein:9,fats:19,fibre:3,ingredients:[{item:"Cucumber",qty:1,unit:"whole"},{item:"Cherry tomatoes",qty:150,unit:"g"},{item:"Feta cheese",qty:80,unit:"g"},{item:"Kalamata olives",qty:50,unit:"g"},{item:"Olive oil",qty:2,unit:"tbsp"}],steps:["Chop cucumber and halve tomatoes.","Combine with olives and feta.","Drizzle with olive oil and season."]},
    {id:5,name:"Overnight Oats",cuisine:"American",difficulty:"Easy",favourite:true,tags:["breakfast","meal-prep"],calories:380,protein:14,fats:9,fibre:8,ingredients:[{item:"Rolled oats",qty:80,unit:"g"},{item:"Almond milk",qty:200,unit:"ml"},{item:"Chia seeds",qty:1,unit:"tbsp"},{item:"Honey",qty:1,unit:"tbsp"},{item:"Berries",qty:100,unit:"g"}],steps:["Mix oats, almond milk, chia seeds and honey.","Refrigerate overnight.","Top with fresh berries before serving."]},
  ];
  const [recipes, setRecipes] = useState(()=>lsGet(username,"recipes",SAMPLE_RECIPES));

  // Planner keyed by "YYYY-MM-DD__MealType" → array of recipe ids
  // This lets us register nutrition to the actual date
  const [planner, setPlanner] = useState(()=>lsGet(username,"planner",{}));
  const [checkedItems, setCheckedItems] = useState(()=>lsGet(username,"checked",{}));
  const [targets, setTargets] = useState(()=>lsGet(username,"targets",{calories:"2000",protein:"50",fats:"30",fibre:"20"}));
  const [selectedGoalDay, setSelectedGoalDay] = useState(todayDayName);
  const [cravingInput, setCravingInput] = useState("");
  const [cravingResults, setCravingResults] = useState(null);
  const [filterCuisine, setFilterCuisine] = useState("All");
  const [filterDiff, setFilterDiff] = useState("All");
  const [filterFav, setFilterFav] = useState(false);
  const [scaleServings, setScaleServings] = useState(1);
  const [chartMetric, setChartMetric] = useState("calories");
  const [pickerOpen, setPickerOpen] = useState(null);
  const [recipeDetailOpen, setRecipeDetailOpen] = useState(null);
  const [addRecipeOpen, setAddRecipeOpen] = useState(false);
  const [editRecipeTarget, setEditRecipeTarget] = useState(null);
  const [deleteConfirmTarget, setDeleteConfirmTarget] = useState(null); // recipe to confirm delete
  const [viewWeekOffset, setViewWeekOffset] = useState(0); // 0=this week, 1=next, 2=+2, etc.
  const [goalsWeekOffset, setGoalsWeekOffset] = useState(0);
  const [tagManagerOpen, setTagManagerOpen] = useState(false);
  const [pinModalOpen, setPinModalOpen] = useState(false);
  const [pinModalStep, setPinModalStep] = useState("menu"); // "menu"|"set"|"change_old"|"change_new"|"remove_confirm"
  const [pinModalInput, setPinModalInput] = useState("");
  const [pinModalOldInput, setPinModalOldInput] = useState("");
  const [pinModalError, setPinModalError] = useState("");
  const [tagEditId, setTagEditId] = useState(null); // tag string being renamed
  const [tagEditVal, setTagEditVal] = useState("");
  const [tagNewVal, setTagNewVal] = useState("");

  // Insights date range — default last 4 weeks
  const defaultEnd = today;
  const defaultStart = addDays(today, -27);
  const [insightStart, setInsightStart] = useState(toDateStr(defaultStart));
  const [insightEnd, setInsightEnd] = useState(toDateStr(defaultEnd));

  const targetsNum = {calories:Number(targets.calories)||0,protein:Number(targets.protein)||0,fats:Number(targets.fats)||0,fibre:Number(targets.fibre)||0};
  const getNutriColor = k=>({calories:"#c4622d",protein:"#5a7a52",fats:"#d4a017",fibre:"#7c6b9e"}[k]);

  useEffect(()=>{ lsSet(username,"recipes",recipes); },[username,recipes]);
  useEffect(()=>{ lsSet(username,"planner",planner); },[username,planner]);
  useEffect(()=>{ lsSet(username,"targets",targets); },[username,targets]);
  useEffect(()=>{ lsSet(username,"checked",checkedItems); },[username,checkedItems]);

  // ── Planner helpers (date-keyed) ─────────────────────────────────────────
  // For the weekly grid we still show Mon-Sun of the current week
  const currentWeekMonday = useMemo(()=>startOfWeek(today),[today]);
  const viewWeekMonday = useMemo(()=>addDays(currentWeekMonday, viewWeekOffset*7),[currentWeekMonday,viewWeekOffset]);

  const getDateForDay = useCallback((dayName) => {
    const idx = DAYS.indexOf(dayName);
    return addDays(viewWeekMonday, idx);
  },[viewWeekMonday]);

  const getPlannerKey = useCallback((dayName, meal) => {
    const d = getDateForDay(dayName);
    return `${toDateStr(d)}__${meal}`;
  },[getDateForDay]);

  const getRecipesForCell = useCallback((dayName, meal) => {
    const ids = planner[getPlannerKey(dayName,meal)]||[];
    return ids.map(id=>recipes.find(r=>r.id===id)).filter(Boolean);
  },[planner,getPlannerKey,recipes]);

  const toggleRecipeInCell = (recipeId) => {
    const key = getPlannerKey(pickerOpen.day,pickerOpen.meal);
    setPlanner(p=>{const cur=p[key]||[];return{...p,[key]:cur.includes(recipeId)?cur.filter(id=>id!==recipeId):[...cur,recipeId]};});
  };
  const removeRecipeFromCell = (dayName,meal,recipeId) => {
    const key = getPlannerKey(dayName,meal);
    setPlanner(p=>{const u=(p[key]||[]).filter(id=>id!==recipeId);if(!u.length){const n={...p};delete n[key];return n;}return{...p,[key]:u};});
  };

  // Nutrition for a given day by dayName (this week)
  const goalsWeekMonday = useMemo(()=>addDays(currentWeekMonday, goalsWeekOffset*7),[currentWeekMonday,goalsWeekOffset]);
  const goalsWeekLabel = useMemo(()=>{
    const end = addDays(goalsWeekMonday,6);
    return `${fmtDate(goalsWeekMonday)} – ${fmtDate(end)}`;
  },[goalsWeekMonday]);
  const getGoalsDayKey = useCallback((dayName, meal)=>{
    const idx = DAYS.indexOf(dayName);
    return `${toDateStr(addDays(goalsWeekMonday,idx))}__${meal}`;
  },[goalsWeekMonday]);

  const getDayNutrition = useCallback((dayName)=>{
    return MEAL_TYPES.reduce((acc,meal)=>{
      (planner[getGoalsDayKey(dayName,meal)]||[]).forEach(id=>{
        const r=recipes.find(x=>x.id===id);
        if(r){acc.calories+=r.calories;acc.protein+=r.protein;acc.fats+=r.fats;acc.fibre+=r.fibre;}
      });
      return acc;
    },{calories:0,protein:0,fats:0,fibre:0});
  },[planner,getGoalsDayKey,recipes]);

  // Shopping list from this week's planner
  const shoppingList = useMemo(()=>{
    const map={};
    Object.values(planner).forEach(ids=>{
      (ids||[]).forEach(id=>{
        const r=recipes.find(x=>x.id===id);
        if(r)r.ingredients.forEach(ing=>{const k=ing.item.toLowerCase();if(map[k])map[k].qty+=ing.qty;else map[k]={...ing};});
      });
    });
    return Object.values(map);
  },[planner,recipes]);

  const toggleFav = id=>setRecipes(rs=>rs.map(r=>r.id===id?{...r,favourite:!r.favourite}:r));
  const saveRecipe = data=>{setRecipes(rs=>[...rs,{...data,id:genId(),favourite:false}]);setAddRecipeOpen(false);};
  const updateRecipe = data=>{setRecipes(rs=>rs.map(r=>r.id===data.id?data:r));setEditRecipeTarget(null);if(recipeDetailOpen?.id===data.id)setRecipeDetailOpen(data);};
  const confirmDelete = (recipe,e)=>{if(e){e.stopPropagation();}setDeleteConfirmTarget(recipe);};
  const executeDelete = ()=>{
    if(!deleteConfirmTarget)return;
    setRecipes(rs=>rs.filter(r=>r.id!==deleteConfirmTarget.id));
    setDeleteConfirmTarget(null);
    if(recipeDetailOpen?.id===deleteConfirmTarget.id)setRecipeDetailOpen(null);
  };


  // derive all unique custom tags across all recipes
  const allTags = useMemo(()=>{
    const s=new Set(); recipes.forEach(r=>(r.tags||[]).forEach(t=>s.add(t))); return [...s].sort();
  },[recipes]);

  const renameTag = (oldTag, newTag) => {
    const n=newTag.trim().toLowerCase().replace(/\s+/g,"-");
    if(!n||n===oldTag)return;
    setRecipes(rs=>rs.map(r=>({...r,tags:(r.tags||[]).map(t=>t===oldTag?n:t)})));
    setTagEditId(null); setTagEditVal("");
  };
  const deleteTag = (tag) => {
    setRecipes(rs=>rs.map(r=>({...r,tags:(r.tags||[]).filter(t=>t!==tag)})));
  };
  const addGlobalTag = () => {
    // Adding a global tag doesn't attach it to any recipe — it just makes it available
    // Instead, we just reset the input; tags are created per-recipe in RecipeForm
    setTagNewVal("");
  };

  // ── Smart craving search ─────────────────────────────────────────────────
  const handleCravingSearch = () => {
    const res = smartCravingSearch(cravingInput, recipes, targetsNum);
    setCravingResults(res);
  };

  // ── Insights: combine history + current week entry ───────────────────────
  // Current week entry uses actual planner data keyed to this week's dates
  const currentWeekEntry = useMemo(()=>{
    const total=DAYS.reduce((acc,day)=>{
      const d=getDayNutrition(day);
      acc.cal+=d.calories;acc.pro+=d.protein;acc.fat+=d.fats;acc.fib+=d.fibre;
      acc.meals+=MEAL_TYPES.reduce((m,meal)=>m+((planner[getPlannerKey(day,meal)]||[]).length>0?1:0),0);
      return acc;
    },{cal:0,pro:0,fat:0,fib:0,meals:0});
    const dw=DAYS.filter(d=>MEAL_TYPES.some(m=>(planner[getPlannerKey(d,m)]||[]).length>0)).length||1;
    return {
      weekStart:toDateStr(currentWeekMonday),
      label:`This week (${fmtDate(currentWeekMonday)})`,
      calories:Math.round(total.cal/dw),protein:Math.round(total.pro/dw),
      fats:Math.round(total.fat/dw),fibre:Math.round(total.fib/dw),
      meals:parseFloat((total.meals/7).toFixed(1)),
      isCurrent:true,
    };
  },[planner,getDayNutrition,currentWeekMonday,getPlannerKey]);

  // Chart data: only real planner weeks + current week
  const allChartData = useMemo(()=>{
    // Build one entry per past week that has planner data
    const pastKeys = Object.keys(planner);
    const weekMap = {};
    pastKeys.forEach(key => {
      const dateStr = key.split("__")[0];
      const d = new Date(dateStr);
      const mon = startOfWeek(d);
      const monStr = toDateStr(mon);
      if (monStr === toDateStr(currentWeekMonday)) return; // skip current week here
      if (!weekMap[monStr]) weekMap[monStr] = {weekStart:monStr, label:fmtDate(mon), calories:0, protein:0, fats:0, fibre:0, meals:0, days:new Set()};
      const meal = key.split("__")[1];
      const ids = planner[key]||[];
      ids.forEach(id=>{
        const r=recipes.find(x=>x.id===id);
        if(r){weekMap[monStr].calories+=r.calories;weekMap[monStr].protein+=r.protein;weekMap[monStr].fats+=r.fats;weekMap[monStr].fibre+=r.fibre;}
      });
      if(ids.length>0) weekMap[monStr].meals+=1;
      weekMap[monStr].days.add(dateStr);
    });
    const pastWeeks = Object.values(weekMap).map(w=>{
      const dCount=w.days.size||1;
      return {...w, calories:Math.round(w.calories/dCount), protein:Math.round(w.protein/dCount), fats:Math.round(w.fats/dCount), fibre:Math.round(w.fibre/dCount), meals:parseFloat((w.meals/7).toFixed(1))};
    }).sort((a,b)=>a.weekStart.localeCompare(b.weekStart));
    return [...pastWeeks, currentWeekEntry];
  },[planner, recipes, currentWeekEntry, currentWeekMonday]);

  // Filter by selected date range
  const filteredChartData = useMemo(()=>{
    return allChartData.filter(w=>{
      if (!insightStart && !insightEnd) return true;
      const ws = w.weekStart;
      if (insightStart && ws < insightStart) return false;
      if (insightEnd && ws > insightEnd) return false;
      return true;
    });
  },[allChartData,insightStart,insightEnd]);

  return (

              <p style={{fontSize:".85rem",color:"var(--text-muted)",marginBottom:20}}>Rename or remove tags across all recipes at once.</p>
              {allTags.length===0
                ?<div style={{textAlign:"center",padding:"32px 0",color:"var(--text-muted)"}}>
                    <div style={{fontSize:"2rem",marginBottom:8}}>🏷️</div>
                    <p>No custom tags yet. Add tags to recipes to manage them here.</p>
                  </div>
                :<div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:360,overflowY:"auto"}}>
                  {allTags.map(tag=>{
                    const count=recipes.filter(r=>(r.tags||[]).includes(tag)).length;
                    const isEditing=tagEditId===tag;
                    return (
                      <div key={tag} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"var(--warm-bg)",borderRadius:10,border:"1.5px solid var(--border)"}}>
                        <span className="tag tag-custom" style={{flexShrink:0}}>{tag}</span>
                        <span style={{fontSize:".75rem",color:"var(--text-muted)",flex:1}}>{count} recipe{count!==1?"s":""}</span>
                        {isEditing
                          ?<>
                            <input type="text" value={tagEditVal} onChange={e=>setTagEditVal(e.target.value)}
                              onKeyDown={e=>{if(e.key==="Enter")renameTag(tag,tagEditVal);if(e.key==="Escape"){setTagEditId(null);setTagEditVal("");}}}
                              style={{width:140,padding:"5px 10px",fontSize:".82rem"}} autoFocus/>
                            <button className="btn btn-primary btn-sm" onClick={()=>renameTag(tag,tagEditVal)}>Save</button>
                            <button className="btn btn-ghost btn-sm" onClick={()=>{setTagEditId(null);setTagEditVal("");}}>✕</button>
                          </>
                          :<>
                            <button className="btn btn-ghost btn-sm" onClick={()=>{setTagEditId(tag);setTagEditVal(tag);}}>✏️ Rename</button>
                            <button className="btn btn-ghost btn-sm" style={{borderColor:"#fca5a5",color:"#991b1b"}}
                              onClick={()=>deleteTag(tag)}>🗑</button>
                          </>
                        }
                      </div>
                    );
                  })}
                </div>
              }
              <div style={{marginTop:20,paddingTop:16,borderTop:"1px solid var(--border)"}}>
                <p style={{fontSize:".75rem",fontWeight:700,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:".04em",marginBottom:8}}>Note</p>
                <p style={{fontSize:".8rem",color:"var(--text-muted)"}}>Renaming a tag updates it across every recipe. Deleting a tag removes it from all recipes permanently.</p>
              </div>
            </div>
          </div>
        )}

        {/* ── PIN MANAGEMENT MODAL ── */}
        {pinModalOpen&&(
          <div className="modal-overlay" onClick={()=>setPinModalOpen(false)}>
            <div className="modal" style={{maxWidth:380,textAlign:"center"}} onClick={e=>e.stopPropagation()}>
              <button className="modal-close" onClick={()=>setPinModalOpen(false)}>✕</button>
              {pinModalStep==="menu"&&(
                <>
                  <div style={{fontSize:"1.6rem",marginBottom:8}}>{hasPin(username)?"🔒":"🔓"}</div>
                  <h2 style={{marginBottom:4}}>PIN Protection</h2>
                  <p style={{fontSize:".85rem",color:"var(--text-muted)",marginBottom:24}}>{hasPin(username)?"Your profile is protected by a PIN.":"Your profile has no PIN — anyone can access it."}</p>
                  {hasPin(username) ? (
                    <div style={{display:"flex",flexDirection:"column",gap:10}}>
                      <button className="btn btn-ghost" onClick={()=>{setPinModalStep("change_old");setPinModalInput("");setPinModalOldInput("");setPinModalError("");}}>🔑 Change PIN</button>
                      <button className="btn btn-ghost" style={{borderColor:"#fca5a5",color:"#991b1b"}} onClick={()=>{setPinModalStep("remove_confirm");setPinModalInput("");setPinModalError("");}}>🗑 Remove PIN</button>
                    </div>
                  ) : (
                    <button className="btn btn-primary" onClick={()=>{setPinModalStep("set");setPinModalInput("");setPinModalError("");}}>Set a PIN</button>
                  )}
                </>
              )}
              {(pinModalStep==="set"||pinModalStep==="change_new")&&(
                <>
                  <div style={{fontSize:"1.6rem",marginBottom:8}}>🔒</div>
                  <h2 style={{marginBottom:4}}>{pinModalStep==="set"?"Set a PIN":"New PIN"}</h2>
                  <p style={{fontSize:".85rem",color:"var(--text-muted)",marginBottom:20}}>Enter a 4-digit PIN for your profile.</p>
                  <input type="password" inputMode="numeric" maxLength={4} placeholder="4-digit PIN" autoFocus
                    value={pinModalInput} onChange={e=>setPinModalInput(e.target.value.replace(/[^0-9]/g,"").slice(0,4))}
                    style={{textAlign:"center",fontSize:"1.5rem",letterSpacing:".3em",marginBottom:8}} />
                  {pinModalError&&<p style={{color:"#dc2626",fontSize:".8rem",marginBottom:8}}>{pinModalError}</p>}
                  <div style={{display:"flex",gap:8,marginTop:8}}>
                    <button className="btn btn-ghost" onClick={()=>setPinModalStep("menu")}>← Back</button>
                    <button className="btn btn-primary" style={{flex:1}} disabled={pinModalInput.length!==4} onClick={()=>{
                      if(pinModalInput.length!==4){setPinModalError("PIN must be 4 digits");return;}
                      setUserPin(username,pinModalInput);setPinModalOpen(false);
                    }}>Save PIN</button>
                  </div>
                </>
              )}
              {pinModalStep==="change_old"&&(
                <>
                  <div style={{fontSize:"1.6rem",marginBottom:8}}>🔑</div>
                  <h2 style={{marginBottom:4}}>Change PIN</h2>
                  <p style={{fontSize:".85rem",color:"var(--text-muted)",marginBottom:20}}>Enter your current PIN first.</p>
                  <input type="password" inputMode="numeric" maxLength={4} placeholder="Current PIN" autoFocus
                    value={pinModalOldInput} onChange={e=>setPinModalOldInput(e.target.value.replace(/[^0-9]/g,"").slice(0,4))}
                    style={{textAlign:"center",fontSize:"1.5rem",letterSpacing:".3em",marginBottom:8}} />
                  {pinModalError&&<p style={{color:"#dc2626",fontSize:".8rem",marginBottom:8}}>{pinModalError}</p>}
                  <div style={{display:"flex",gap:8,marginTop:8}}>
                    <button className="btn btn-ghost" onClick={()=>setPinModalStep("menu")}>← Back</button>
                    <button className="btn btn-primary" style={{flex:1}} disabled={pinModalOldInput.length!==4} onClick={()=>{
                      if(pinModalOldInput!==getUserPin(username)){setPinModalError("Incorrect PIN");setPinModalOldInput("");return;}
                      setPinModalStep("change_new");setPinModalInput("");setPinModalError("");
                    }}>Next →</button>
                  </div>
                </>
              )}
              {pinModalStep==="remove_confirm"&&(
                <>
                  <div style={{fontSize:"1.6rem",marginBottom:8}}>🔓</div>
                  <h2 style={{marginBottom:4}}>Remove PIN?</h2>
                  <p style={{fontSize:".85rem",color:"var(--text-muted)",marginBottom:20}}>Your profile will be accessible without a PIN.</p>
                  <input type="password" inputMode="numeric" maxLength={4} placeholder="Confirm current PIN" autoFocus
                    value={pinModalInput} onChange={e=>setPinModalInput(e.target.value.replace(/[^0-9]/g,"").slice(0,4))}
                    style={{textAlign:"center",fontSize:"1.5rem",letterSpacing:".3em",marginBottom:8}} />
                  {pinModalError&&<p style={{color:"#dc2626",fontSize:".8rem",marginBottom:8}}>{pinModalError}</p>}
                  <div style={{display:"flex",gap:8,marginTop:8}}>
                    <button className="btn btn-ghost" onClick={()=>setPinModalStep("menu")}>← Back</button>
                    <button className="btn btn-primary" style={{flex:1,background:"#dc2626"}} disabled={pinModalInput.length!==4} onClick={()=>{
                      if(pinModalInput!==getUserPin(username)){setPinModalError("Incorrect PIN");setPinModalInput("");return;}
                      setUserPin(username,null);setPinModalOpen(false);
                    }}>Remove PIN</button>
                  </div>
                </>
              )}
            </div>
          </div>
        )}

        {/* ── DELETE CONFIRM MODAL ── */}
        {deleteConfirmTarget&&(
          <div className="modal-overlay" onClick={()=>setDeleteConfirmTarget(null)}>
            <div className="modal" style={{maxWidth:420,textAlign:"center"}} onClick={e=>e.stopPropagation()}>
              <div style={{fontSize:"2rem",marginBottom:12}}>🗑️</div>
              <h2 style={{marginBottom:8}}>Delete this recipe?</h2>
              <p style={{fontSize:".9rem",color:"var(--text-muted)",marginBottom:8}}><strong style={{color:"var(--text)"}}>{deleteConfirmTarget.name}</strong></p>
              <p style={{fontSize:".85rem",color:"#991b1b",background:"#fee2e2",borderRadius:10,padding:"10px 14px",marginBottom:24}}>⚠️ This cannot be undone. Once deleted, this recipe is gone for good.</p>
              <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                <button className="btn btn-ghost" onClick={()=>setDeleteConfirmTarget(null)}>Cancel, keep it</button>
                <button className="btn btn-primary" style={{background:"#dc2626"}} onClick={executeDelete}>Yes, delete it</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </>
  );
}

// ── Root — shows UserGate then MealPrepPlanner ──────────────────────────────
function App() {
  const [username, setUsername] = useState(()=>lsRaw(LS_ACTIVE_USER, null));
  return username
    ? <MealPrepPlanner username={username} onSwitchUser={()=>{ lsRawSet(LS_ACTIVE_USER,null); setUsername(null); }}/>
    : <UserGate onEnter={name=>setUsername(name)}/>;
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
